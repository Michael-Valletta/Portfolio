    <div class="container1">
      <h1 id="stntitle">Gaming Setup Picker Assistant</h1>
      <p id="hp">This website will give you a Quote depending on which setup and location you choose, in order to give you an idea of the cost.</p>
    </div>
    <div class="container">
        <form id="setup">
          <div class="mb-3">
            <label for="FullName" class="form-label">Full Name:</label>
            <input type="Name" class="form-control" id="FullName">
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email:</label>
            <input type="email" id="email" class="form-control">
          </div>

          <div class="mb-3">
            <label for="numofMonitors" class="form-label">Number Of Monitors:</label>
            <input type="number" id="numofMonitors" class="form-control">
          </div>

          <div class="dropdown">
            <button class="btn btn-secondary dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false" id="setupchoice">
              Gaming Setup Options
            </button>
            <ul class="dropdown-menu" aria-labelledby="setupchoice">
              <li><a class="dropdown-item" href="#" onclick="SelectSetup('Low End Setup')">Low End Setup</a></li>
              <li><a class="dropdown-item" href="#" onclick="SelectSetup('Average Setup')">Average Setup</a></li>
              <li><a class="dropdown-item" href="#" onclick="SelectSetup('High End Setup')">High End Setup</a></li>
            </ul>
          </div>

          <div class="mb-3">
            <p>Where are you Planning on buying the setup?</p>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="" id="Europe">
              <label class="form-check-label" for="Europe">Europe</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="" id="OutsideEu">
              <label class="form-check-label" for="OutsideEu">Outside Europe</label>
            </div>   
          </div>

          <button type="button" onclick="ValidateAndCalculate()">Get Quote</button>
          <div id="result"></div>
          

        </form>
    

    </div>
  
    
    
</body>
